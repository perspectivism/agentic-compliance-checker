name: CI

on:
  push:
  pull_request:
  workflow_dispatch:  # allows triggering a run manually from the GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test the floor (3.12) and the current version (3.13) — proves the whole
        # supported range, not just the minimum.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Fast-lane tests import agentic_compliance.graph (and other modules that need
      # langchain/langgraph/chromadb at module import time, not just inside agent-marked
      # tests) — pytest has to import a test module before it can filter by marker, so
      # `-m "not agent"` can't skip a collection-time ImportError. [dev] alone leaves
      # this uninstalled and aborts the whole run before any test executes; [agent] is
      # required here even though no fast-lane test makes a real model/network call.
      - name: Install (core + dev + agent)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent]"

      # Lint + format gate: ruff is the single linter/formatter. format --check fails the
      # build on unformatted code (the editor's format-on-save isn't enough for agents/CI).
      - name: Lint and format check
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      # Fast lane: deterministic tests (loader, MCP tools, scanners, graph routing
      # with mocked LLMs). Agent-stack tests are marked `agent` and run separately
      # because they may need heavier runtime deps, real embeddings, model/network
      # access, or API keys. Golden-set parsing/schema validation is part of this
      # lane (tests/test_golden.py) — the real eval (scripts/run_eval.py) runs the
      # LLM graph and lives in eval.yml (manual dispatch), never here.
      - name: Tests (fast lane)
        run: pytest -m "not agent" -q

  # Dogfooding: hold this repo to the same bar the tool assesses others against —
  # dependency scanning (SI-2/RA-5) and no hardcoded secrets (IA-5).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Dependency audit (dogfood SI-2/RA-5)
        # BLOCKING: a new advisory fails the build until triaged. Accepted risks below
        # are documented waivers, not suppressions of convenience — re-review each when
        # its package publishes a fixed version (none published as of 2026-07-02):
        #  - PYSEC-2026-311 (chromadb): pre-auth RCE in the Chroma *server* API endpoint.
        #    This project uses Chroma embedded-only; no Chroma server ever runs and no
        #    endpoint is exposed (docs/ARCHITECTURE.md "RAG store").
        #  - CVE-2025-69872 (diskcache, transitive): pickle deserialization requiring an
        #    attacker with write access to the local cache directory — host compromise,
        #    outside this tool's threat boundary (docs/THREAT_MODEL.md scope).
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install -e ".[agent]"
          pip-audit \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln CVE-2025-69872

      - name: Secret scan (dogfood IA-5)
        # gitleaks via Docker needs no license (unlike the org-gated Action). The config
        # allowlists tests/fixtures, which hold intentional fake secrets. --redact keeps
        # any match out of the logs. This step is BLOCKING: real secrets must never land.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml --no-banner --redact
