cases:
- id: ci_no_security_repo_SI-2-RA-5_001
  repo_fixture: ci_no_security_repo
  control_id: SI-2/RA-5
  question: Does the repository configure vulnerability or dependency scanning in
    CI?
  expected_verdict: gap
  expected_evidence_hints:
  - CI workflow only installs package and runs pytest
  - No Trivy/Snyk/pip-audit/Dependabot or dependency scanning step
  - build.yml notes no dependency or container scanning
  human_verified: true
- id: ci_no_security_repo_IA-5_002
  repo_fixture: ci_no_security_repo
  control_id: IA-5
  question: Does the repository demonstrate secure secrets handling or contain hardcoded
    secrets?
  expected_verdict: not_assessable
  expected_evidence_hints:
  - workflow only runs checkout, pip install, pytest
  - no secrets or credentials referenced
  - no env vars, secrets manager, or OIDC evidence
  human_verified: true
- id: ci_no_security_repo_AC-6_003
  repo_fixture: ci_no_security_repo
  control_id: AC-6
  question: Does the repository define IAM permissions using scoped actions and resources
    rather than broad wildcard admin access?
  expected_verdict: not_assessable
  expected_evidence_hints:
  - No IAM policies or permission definitions present
  - Only CI build/test workflow shown
  human_verified: true
- id: ci_no_security_repo_CM-3_004
  repo_fixture: ci_no_security_repo
  control_id: CM-3
  question: Does the repository show a change control gate such as code owners, branch
    protection, or required reviews?
  expected_verdict: not_assessable
  expected_evidence_hints:
  - No CODEOWNERS file present (file-based check only)
  - "Branch protection / required reviews are GitHub repo settings, not file content\
    \ \u2014 not observable from a bounded repo-content search"
  human_verified: true
